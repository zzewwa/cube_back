name: Deploy Backend to VM

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_PUBLIC_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            export DEBIAN_FRONTEND=noninteractive

            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            else
              SUDO=""
            fi

            DEPLOY_USER="$(id -un)"
            DEPLOY_GROUP="$(id -gn)"

            # Install required host tools if they are missing.
            if ! command -v git >/dev/null 2>&1 || ! command -v psql >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                $SUDO apt-get update
                if ! command -v git >/dev/null 2>&1; then
                  $SUDO apt-get install -yq git
                fi
                if ! command -v psql >/dev/null 2>&1; then
                  $SUDO apt-get install -yq postgresql-client
                fi
              elif command -v dnf >/dev/null 2>&1; then
                if ! command -v git >/dev/null 2>&1; then
                  $SUDO dnf install -y git
                fi
                if ! command -v psql >/dev/null 2>&1; then
                  $SUDO dnf install -y postgresql
                fi
              elif command -v yum >/dev/null 2>&1; then
                if ! command -v git >/dev/null 2>&1; then
                  $SUDO yum install -y git
                fi
                if ! command -v psql >/dev/null 2>&1; then
                  $SUDO yum install -y postgresql
                fi
              else
                echo "Unsupported package manager. Install git and psql manually."
                exit 1
              fi
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker is not installed on VM"
              exit 1
            fi

            if docker info >/dev/null 2>&1; then
              DOCKER_CMD="docker"
            elif [ -n "$SUDO" ] && $SUDO docker info >/dev/null 2>&1; then
              DOCKER_CMD="$SUDO docker"
            else
              echo "Docker daemon is not available for current user"
              exit 1
            fi

            APP_DIR="/opt/my_cube_split"
            BACKEND_DIR="$APP_DIR/backend_repo"
            FRONTEND_DIR="$APP_DIR/frontend_repo"
            BACKEND_REPO_URL="${{ secrets.BACKEND_REPO_URL }}"
            FRONTEND_REPO_URL="${{ secrets.FRONTEND_REPO_URL }}"
            DOMAIN_NAME="${{ secrets.DOMAIN_NAME }}"
            DOMAIN_WWW="${{ secrets.DOMAIN_WWW }}"

            if [ -z "$DOMAIN_NAME" ]; then
              DOMAIN_NAME="3dspeedcubing.ru"
            fi

            if [ -z "$DOMAIN_WWW" ]; then
              DOMAIN_WWW="www.$DOMAIN_NAME"
            fi

            if mkdir -p "$APP_DIR" >/dev/null 2>&1; then
              true
            elif [ -n "$SUDO" ]; then
              $SUDO mkdir -p "$APP_DIR"
              $SUDO chown "$DEPLOY_USER":"$DEPLOY_GROUP" "$APP_DIR"
            else
              APP_DIR="$HOME/my_cube_split"
              mkdir -p "$APP_DIR"
              BACKEND_DIR="$APP_DIR/backend_repo"
              FRONTEND_DIR="$APP_DIR/frontend_repo"
            fi

            if [ ! -d "$BACKEND_DIR/.git" ]; then
              git clone "$BACKEND_REPO_URL" "$BACKEND_DIR"
            fi

            if [ ! -d "$FRONTEND_DIR/.git" ]; then
              git clone "$FRONTEND_REPO_URL" "$FRONTEND_DIR"
            fi

            if [ -n "$SUDO" ]; then
              $SUDO mkdir -p "$BACKEND_DIR" "$FRONTEND_DIR"
              $SUDO chown -R "$DEPLOY_USER":"$DEPLOY_GROUP" "$BACKEND_DIR" "$FRONTEND_DIR" || true
            fi

            sync_repo() {
              REPO_DIR="$1"
              REPO_URL="$2"

              cd "$REPO_DIR"
              if [ -n "$SUDO" ]; then
                $SUDO chown -R "$DEPLOY_USER":"$DEPLOY_GROUP" "$REPO_DIR" || true
              fi
              git remote set-url origin "$REPO_URL"
              git fetch --prune origin

              if git ls-remote --heads origin main | grep -q "refs/heads/main"; then
                TARGET_BRANCH="main"
              else
                TARGET_BRANCH="master"
              fi

              git merge --abort >/dev/null 2>&1 || true
              git rebase --abort >/dev/null 2>&1 || true
              git reset --hard HEAD >/dev/null 2>&1 || true
              git clean -fd

              git checkout -f "$TARGET_BRANCH" >/dev/null 2>&1 || git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
              git reset --hard "origin/$TARGET_BRANCH"
              git clean -fd
            }

            sync_repo "$BACKEND_DIR" "$BACKEND_REPO_URL"
            sync_repo "$FRONTEND_DIR" "$FRONTEND_REPO_URL"

            cd "$BACKEND_DIR"
            if $DOCKER_CMD compose version >/dev/null 2>&1; then
              COMPOSE_CMD="$DOCKER_CMD compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              if [ -n "$SUDO" ]; then
                COMPOSE_CMD="$SUDO docker-compose"
              else
                COMPOSE_CMD="docker-compose"
              fi
            else
              echo "Neither 'docker compose' nor 'docker-compose' is available"
              exit 1
            fi

            $COMPOSE_CMD down
            $COMPOSE_CMD up -d --build

            if ! command -v nginx >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                $SUDO apt-get update
                $SUDO apt-get install -yq nginx
              elif command -v dnf >/dev/null 2>&1; then
                $SUDO dnf install -y nginx
              elif command -v yum >/dev/null 2>&1; then
                $SUDO yum install -y nginx
              else
                echo "Unsupported package manager for nginx install"
                exit 1
              fi
            fi

            if command -v ufw >/dev/null 2>&1; then
              $SUDO ufw allow 80/tcp || true
              $SUDO ufw allow 443/tcp || true
            fi

            $SUDO mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
            $SUDO tee /etc/nginx/sites-available/my_cube >/dev/null <<EOF
            server {
              listen 80;
              server_name $DOMAIN_NAME $DOMAIN_WWW;

              location /media/ {
                alias $BACKEND_DIR/media/;
                access_log off;
                expires 30d;
              }

              location /static/ {
                alias $BACKEND_DIR/staticfiles/;
                access_log off;
                expires 30d;
              }

              location / {
                proxy_pass http://127.0.0.1:8000;
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_set_header Upgrade \$http_upgrade;
                proxy_set_header Connection "upgrade";
              }
            }
            EOF

            $SUDO ln -sfn /etc/nginx/sites-available/my_cube /etc/nginx/sites-enabled/my_cube
            $SUDO rm -f /etc/nginx/sites-enabled/default
            $SUDO mkdir -p "$BACKEND_DIR/media" "$BACKEND_DIR/staticfiles"
            $SUDO chmod -R a+rX "$BACKEND_DIR/media" "$BACKEND_DIR/staticfiles" || true
            $SUDO nginx -t
            $SUDO systemctl enable nginx
            $SUDO systemctl restart nginx
            echo "HTTPS setup is skipped in workflow"
