name: Deploy Backend to VM

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_PUBLIC_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            export DEBIAN_FRONTEND=noninteractive

            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            else
              SUDO=""
            fi

            DEPLOY_USER="$(id -un)"
            DEPLOY_GROUP="$(id -gn)"

            # Install required host tools if they are missing.
            if ! command -v git >/dev/null 2>&1 || ! command -v psql >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                $SUDO apt-get update
                if ! command -v git >/dev/null 2>&1; then
                  $SUDO apt-get install -yq git
                fi
                if ! command -v psql >/dev/null 2>&1; then
                  $SUDO apt-get install -yq postgresql-client
                fi
              elif command -v dnf >/dev/null 2>&1; then
                if ! command -v git >/dev/null 2>&1; then
                  $SUDO dnf install -y git
                fi
                if ! command -v psql >/dev/null 2>&1; then
                  $SUDO dnf install -y postgresql
                fi
              elif command -v yum >/dev/null 2>&1; then
                if ! command -v git >/dev/null 2>&1; then
                  $SUDO yum install -y git
                fi
                if ! command -v psql >/dev/null 2>&1; then
                  $SUDO yum install -y postgresql
                fi
              else
                echo "Unsupported package manager. Install git and psql manually."
                exit 1
              fi
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker is not installed on VM"
              exit 1
            fi

            if docker info >/dev/null 2>&1; then
              DOCKER_CMD="docker"
            elif [ -n "$SUDO" ] && $SUDO docker info >/dev/null 2>&1; then
              DOCKER_CMD="$SUDO docker"
            else
              echo "Docker daemon is not available for current user"
              exit 1
            fi

            APP_DIR="/opt/my_cube_split"
            BACKEND_DIR="$APP_DIR/backend_repo"
            FRONTEND_DIR="$APP_DIR/frontend_repo"
            BACKEND_REPO_URL="${{ secrets.BACKEND_REPO_URL }}"
            FRONTEND_REPO_URL="${{ secrets.FRONTEND_REPO_URL }}"

            if mkdir -p "$APP_DIR" >/dev/null 2>&1; then
              true
            elif [ -n "$SUDO" ]; then
              $SUDO mkdir -p "$APP_DIR"
              $SUDO chown "$DEPLOY_USER":"$DEPLOY_GROUP" "$APP_DIR"
            else
              APP_DIR="$HOME/my_cube_split"
              mkdir -p "$APP_DIR"
              BACKEND_DIR="$APP_DIR/backend_repo"
              FRONTEND_DIR="$APP_DIR/frontend_repo"
            fi

            sync_repo_fresh() {
              REPO_DIR="$1"
              REPO_URL="$2"

              if git ls-remote --heads "$REPO_URL" main | grep -q "refs/heads/main"; then
                TARGET_BRANCH="main"
              else
                TARGET_BRANCH="master"
              fi

              if [ -e "$REPO_DIR" ]; then
                if [ -n "$SUDO" ]; then
                  $SUDO rm -rf "$REPO_DIR"
                else
                  rm -rf "$REPO_DIR"
                fi
              fi

              git clone --depth 1 --branch "$TARGET_BRANCH" "$REPO_URL" "$REPO_DIR"
              if [ -n "$SUDO" ]; then
                $SUDO chown -R "$DEPLOY_USER":"$DEPLOY_GROUP" "$REPO_DIR" || true
              fi
            }

            sync_repo_fresh "$BACKEND_DIR" "$BACKEND_REPO_URL"
            sync_repo_fresh "$FRONTEND_DIR" "$FRONTEND_REPO_URL"

            cd "$BACKEND_DIR"
            if $DOCKER_CMD compose version >/dev/null 2>&1; then
              COMPOSE_CMD="$DOCKER_CMD compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              if [ -n "$SUDO" ]; then
                COMPOSE_CMD="$SUDO docker-compose"
              else
                COMPOSE_CMD="docker-compose"
              fi
            else
              echo "Neither 'docker compose' nor 'docker-compose' is available"
              exit 1
            fi

            $COMPOSE_CMD down
            $COMPOSE_CMD up -d --build
