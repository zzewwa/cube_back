name: Deploy Backend to VM

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_PUBLIC_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e

            export DEBIAN_FRONTEND=noninteractive

            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            else
              SUDO=""
            fi

            # Install required host tools if they are missing.
            if ! command -v git >/dev/null 2>&1 || ! command -v psql >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                $SUDO apt-get update
                if ! command -v git >/dev/null 2>&1; then
                  $SUDO apt-get install -yq git
                fi
                if ! command -v psql >/dev/null 2>&1; then
                  $SUDO apt-get install -yq postgresql-client
                fi
              elif command -v dnf >/dev/null 2>&1; then
                if ! command -v git >/dev/null 2>&1; then
                  $SUDO dnf install -y git
                fi
                if ! command -v psql >/dev/null 2>&1; then
                  $SUDO dnf install -y postgresql
                fi
              elif command -v yum >/dev/null 2>&1; then
                if ! command -v git >/dev/null 2>&1; then
                  $SUDO yum install -y git
                fi
                if ! command -v psql >/dev/null 2>&1; then
                  $SUDO yum install -y postgresql
                fi
              else
                echo "Unsupported package manager. Install git and psql manually."
                exit 1
              fi
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker is not installed on VM"
              exit 1
            fi

            if docker info >/dev/null 2>&1; then
              DOCKER_CMD="docker"
            elif [ -n "$SUDO" ] && $SUDO docker info >/dev/null 2>&1; then
              DOCKER_CMD="$SUDO docker"
            else
              echo "Docker daemon is not available for current user"
              exit 1
            fi

            APP_DIR="/opt/my_cube_split"
            BACKEND_DIR="$APP_DIR/backend_repo"
            FRONTEND_DIR="$APP_DIR/frontend_repo"
            BACKEND_REPO_URL="${{ secrets.BACKEND_REPO_URL }}"
            FRONTEND_REPO_URL="${{ secrets.FRONTEND_REPO_URL }}"
            TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
            TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
            TELEGRAM_PROXY_URL="${{ secrets.TELEGRAM_PROXY_URL }}"

            if mkdir -p "$APP_DIR" >/dev/null 2>&1; then
              true
            elif [ -n "$SUDO" ]; then
              $SUDO mkdir -p "$APP_DIR"
              $SUDO chown "$USER":"$(id -gn)" "$APP_DIR"
            else
              APP_DIR="$HOME/my_cube_split"
              mkdir -p "$APP_DIR"
              BACKEND_DIR="$APP_DIR/backend_repo"
              FRONTEND_DIR="$APP_DIR/frontend_repo"
            fi

            if [ ! -d "$BACKEND_DIR/.git" ]; then
              git clone "$BACKEND_REPO_URL" "$BACKEND_DIR"
            fi

            if [ ! -d "$FRONTEND_DIR/.git" ]; then
              git clone "$FRONTEND_REPO_URL" "$FRONTEND_DIR"
            fi

            cd "$BACKEND_DIR"
            git fetch origin
            git checkout main || git checkout master
            git pull --rebase --autostash origin "$(git rev-parse --abbrev-ref HEAD)"

            cd "$FRONTEND_DIR"
            git fetch origin
            git checkout main || git checkout master
            git pull --rebase --autostash origin "$(git rev-parse --abbrev-ref HEAD)"

            cd "$BACKEND_DIR"
            cat > .env <<EOF
            TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
            TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
            TELEGRAM_PROXY_URL=${TELEGRAM_PROXY_URL}
            EOF

            if $DOCKER_CMD compose version >/dev/null 2>&1; then
              COMPOSE_CMD="$DOCKER_CMD compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              if [ -n "$SUDO" ]; then
                COMPOSE_CMD="$SUDO docker-compose"
              else
                COMPOSE_CMD="docker-compose"
              fi
            else
              echo "Neither 'docker compose' nor 'docker-compose' is available"
              exit 1
            fi

            $COMPOSE_CMD down
            $COMPOSE_CMD up -d --build
