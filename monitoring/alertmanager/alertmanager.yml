global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 15m
  receiver: mycube-webhook

receivers:
  - name: mycube-webhook
    webhook_configs:
      - url: http://web:8000/internal/alertmanager/webhook/?token=mycube-alertmanager-webhook-token-2026
        send_resolved: true
