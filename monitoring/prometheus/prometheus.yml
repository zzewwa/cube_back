global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: mycube_backend
    metrics_path: /internal/metrics/
    static_configs:
      - targets: ["web:8000"]
