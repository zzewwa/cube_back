groups:
  - name: mycube-availability
    rules:
      - alert: MyCubeBackendDown
        expr: up{job="mycube_backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MyCube backend недоступен"
          description: "Prometheus не может получить /internal/metrics/ с web:8000 более 1 минуты"

      - alert: MyCubeMetricsMissing
        expr: absent(mycube_total_users)
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "MyCube метрики отсутствуют"
          description: "Метрика mycube_total_users не поступает более 2 минут"
