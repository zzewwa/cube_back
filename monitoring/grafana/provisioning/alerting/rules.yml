apiVersion: 1

groups:
  - orgId: 1
    name: mycube-backend-alerts
    folder: MyCube Alerts
    interval: 30s
    rules:
      - uid: mycube_backend_down
        title: MyCube Backend Down
        condition: B
        for: 1m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: MyCube backend metrics endpoint is down
          description: Prometheus target job mycube_backend is not up for 1 minute.
        labels:
          severity: critical
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: mycube-prometheus
            model:
              editorMode: code
              expr: up{job="mycube_backend"}
              intervalMs: 1000
              maxDataPoints: 43200
              range: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
