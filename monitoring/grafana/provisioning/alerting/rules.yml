apiVersion: 1

groups:
  - orgId: 1
    name: mycube-backend-alerts
    folder: MyCube Alerts
    interval: 30s
    rules:
      - uid: mycube_backend_down
        title: MyCube Backend Down or No Data
        condition: B
        for: 1m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: MyCube backend metrics endpoint is down or no data
          description: Prometheus target job mycube_backend is not up/no data for 1 minute. Check logs in /opt/my_cube_split/backend_repo/logs/error.log and /opt/my_cube_split/backend_repo/logs/app.log.
        labels:
          severity: critical
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: mycube-prometheus
            model:
              editorMode: code
              expr: up{job="mycube_backend"}
              intervalMs: 1000
              maxDataPoints: 43200
              range: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
      - uid: mycube_backend_http_5xx
        title: MyCube Backend Returns 5xx
        condition: B
        for: 1m
        noDataState: OK
        execErrState: Alerting
        annotations:
          summary: MyCube backend has HTTP 5xx responses
          description: More than 3 HTTP 5xx responses detected in last 5 minutes. Check /opt/my_cube_split/backend_repo/logs/error.log and /opt/my_cube_split/backend_repo/logs/app.log for root cause.
        labels:
          severity: critical
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: mycube-prometheus
            model:
              editorMode: code
              expr: sum(increase(mycube_http_responses_total{status_class="5xx"}[5m])) or vector(0)
              intervalMs: 1000
              maxDataPoints: 43200
              range: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 3
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
