apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/zzewwa/cube-back:latest
        ports:
        - containerPort: 8000
        env:
        - name: ENV
          value: "production"
